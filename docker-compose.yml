# docker-compose.yml — full local development stack
# Runs Ziggy backend + Home Assistant + Mosquitto together.
# For production cloud homes, see docker/home-template/docker-compose.yml

services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./docker/ha-config:/config
    depends_on: [mosquitto]

  ziggy:
    build: .
    restart: unless-stopped
    # network_mode: host so Ziggy can reach an EXISTING HA + Mosquitto on
    # the mini PC's localhost (they're in separate Docker containers /
    # native daemons, not in this compose project). Works on Linux mini
    # PCs (and the Hetzner/Oracle VMs). DOES NOT WORK on Docker Desktop
    # for Mac — Mac dev uses docker-compose.dev.yml instead.
    #
    # Side effect of host networking: the `ports:` directive is ignored,
    # so port 8001 binds directly on the host (which is what we want for
    # the Cloudflare Tunnel anyway).
    network_mode: host
    environment:
      # This compose file is for self-hosted hubs (mini PC). The Dockerfile
      # defaults CLOUD_MODE=true / HOME_TYPE=cloud for the per-home cloud
      # VM image (set explicitly by relay/app/provisioner.py). Override
      # both here so a self-hosted hub doesn't inherit cloud-mode semantics
      # (skipped config validation, env-var-driven setup, etc.).
      - CLOUD_MODE=${CLOUD_MODE:-false}
      - HOME_TYPE=${HOME_TYPE:-hub}
      - HOME_ID=${HOME_ID:-home-ziggy-dev}
      - RELAY_URL=${RELAY_URL:-}
      - RELAY_SECRET=${RELAY_SECRET:-}
    volumes:
      - ./config:/app/config
      - ./user_files:/app/user_files
      # HA installer (Prompt 4): Ziggy recreates the homeassistant container
      # at a pinned tag from the OTA manifest. The compose file lives on the
      # host; the installer reads + edits it and runs `docker compose up -d`
      # via the host's docker daemon. Bind grants root-equivalent on the host
      # — acceptable for single-tenant hubs, will tighten via a socket-proxy
      # in a follow-up if multi-tenancy lands.
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/host/docker-compose.yml
    # No depends_on — HA + Mosquitto live in their own containers on this
    # mini PC, started independently. Start Ziggy with:
    #   docker compose up -d --build --no-deps ziggy

volumes:
  mosquitto_data:
  mosquitto_log:
