# docker-compose.yml — full local development stack
# Runs Ziggy backend + Home Assistant + Mosquitto together.
# For production cloud homes, see docker/home-template/docker-compose.yml

services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./docker/ha-config:/config
    depends_on: [mosquitto]

  ziggy:
    build: .
    restart: unless-stopped
    # Bridge networking + published port. Works on every Docker host
    # (Linux, Docker Desktop for Mac / Windows).
    #
    # IMPORTANT: from inside this container, "localhost" is the container
    # itself, NOT the mini PC. To reach an external HA (e.g. running in a
    # VirtualBox VM at 10.100.102.21, or anywhere else on the LAN), set
    # home_assistant.url in ~/.ziggy/home.yaml to the LAN IP of HA, not
    # localhost.
    ports:
      - "8001:8001"
    environment:
      # This compose file is for self-hosted hubs (mini PC). The Dockerfile
      # defaults CLOUD_MODE=true / HOME_TYPE=cloud for the per-home cloud
      # VM image (set explicitly by relay/app/provisioner.py). Override
      # both here so a self-hosted hub doesn't inherit cloud-mode semantics
      # (skipped config validation, env-var-driven setup, etc.).
      - CLOUD_MODE=${CLOUD_MODE:-false}
      - HOME_TYPE=${HOME_TYPE:-hub}
      - HOME_ID=${HOME_ID:-home-ziggy-dev}
      - RELAY_URL=${RELAY_URL:-}
      - RELAY_SECRET=${RELAY_SECRET:-}
    volumes:
      - ./config:/app/config
      - ./user_files:/app/user_files
      # NOTE: the OTA HA-installer bind mounts (docker.sock + host compose
      # file) are intentionally omitted here. They're Linux-only paths
      # (/var/run/docker.sock) and the self-hosted "git pull + docker
      # compose up" deploy path doesn't use the OTA installer. If we ever
      # ship the OTA installer on Linux hubs, add a separate
      # docker-compose.ota.yml override that re-adds those mounts.
    # No depends_on — HA + Mosquitto live in their own containers / VMs on
    # this mini PC, started independently. Start Ziggy with:
    #   docker compose up -d --build --no-deps ziggy

volumes:
  mosquitto_data:
  mosquitto_log:
