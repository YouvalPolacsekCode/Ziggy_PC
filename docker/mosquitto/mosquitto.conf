# docker/mosquitto/mosquitto.conf — PRODUCTION broker config for beta hubs.
#
# Difference from the dev broker (docker/mosquitto.conf):
#   dev  → allow_anonymous true   (no creds, single-machine convenience)
#   prod → allow_anonymous false  + password_file (every client authenticates)
#
# The password_file is generated at FACTORY IMAGING time by
# scripts/factory/ziggy-image-device.sh (it runs `mosquitto_passwd` inside the
# eclipse-mosquitto image to hash a randomly-generated password) and written to
# docker/mosquitto/passwordfile on the hub. See passwordfile.template + README.md
# in this directory for the mechanism. The same generated user/pass is injected
# into:
#   - Home Assistant's MQTT config entry (via scripts/ha-seed.sh)
#   - Zigbee2MQTT's configuration.yaml  (mqtt.user / mqtt.password)
#   - Ziggy's MQTT_URL env  (mqtt://user:pass@mosquitto:1883)
#
# NOTE: this file is bind-mounted read-only. The passwordfile is a SEPARATE
# mount so the conf can stay in git while the hashed creds stay out of it.

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwordfile

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_type warning
log_type error
log_type notice
