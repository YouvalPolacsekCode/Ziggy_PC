# Ziggy — example configuration
# ------------------------------------------------------------------
# Copy this file to config/settings.yaml on a fresh install. The real
# settings.yaml is git-ignored (or should be — see AUDIT §S1 / §6).
#
# Every secret in this file is a placeholder. Replace them with real
# values from a secrets manager or the .env file. NEVER commit a real
# settings.yaml with these fields populated.
#
# Sections that point at Home Assistant entity_ids (device_map,
# target_registry, sensor_alerts, calendar, global_sensors) are
# deployment-specific. The values below are illustrative — adjust
# per home.
# ------------------------------------------------------------------

# Beta / launch marker. Israel-first beta builds ship with this true so the
# backend and telemetry can distinguish beta hubs from later GA installs.
# Purely informational — no feature is gated on it yet. Set false for GA.
beta: true
tier: beta

anomaly_engine:
  anom02_empty_minutes: 30
  anom03_door_open_minutes: 60
  anom06_runtime_hours: 4
  enabled: true
  exemptions:
  - switch.nas
  - switch.router
  quiet_hour_end: 7
  quiet_hour_start: 23

audio:
  ffplay_path: ''        # path to ffplay binary; e.g. /usr/bin/ffplay on Linux
  input_device: null     # null = system default
  output_device: null

auth:
  # Legacy single-user auth fields. Kept for backward-compat reads from
  # existing deployments only. New installs persist user + session records
  # in user_files/auth.db (SQLite) — see services/auth_db.py.
  password_hash: REPLACE_WITH_PASSWORD_HASH
  salt: REPLACE_WITH_SALT
  session_token: REPLACE_WITH_SESSION_TOKEN
  username: admin@example.com

backup:
  # Daily encrypted backup of HA config + Ziggy state + Zigbee coordinator
  # to Backblaze B2. Full design in DESIGN_BACKUP_DR.md.
  #
  # v1 ships with backup OFF by default. Flip enabled: true only after the
  # factory imaging script has sealed a per-home data_key + B2 credentials
  # into the relay DB. The exact seal call is documented in
  # docs/SEAL_KEY_SNIPPET_FOR_FACTORY_IMAGING.md (lands in Chunk #10).
  enabled: false

  # Backblaze B2 endpoint + bucket. The bucket is shared across all homes;
  # per-home isolation is enforced by per-home application keys that are
  # prefix-restricted to {home_id}/ (see DESIGN_BACKUP_DR.md §5).
  # EU residency: bucket lives in Backblaze B2 eu-central (Amsterdam).
  # All customer data stays in the EU — same rationale as the Fly.io relay
  # being deployed in Amsterdam. Do NOT switch to a US region without first
  # updating the privacy policy.
  b2_endpoint: https://s3.eu-central-003.backblazeb2.com
  b2_bucket: ziggy-backups-prod

  # Per-home B2 application key + key_id are resolved from environment
  # variables at runtime — NEVER stored in plain settings.yaml. The imaging
  # script writes the live credentials to b2_credentials_path (below) and
  # exports the matching env vars on the hub. The names here are env-var
  # NAMES, not the secret values.
  b2_key_id_env: ZIGGY_B2_KEY_ID
  b2_app_key_env: ZIGGY_B2_APP_KEY

  # Daily run time in hub-local time. NTP sync is verified before each run
  # (skipped if clock skew > 60s, see DESIGN_BACKUP_DR.md §6 pre-flight).
  schedule_hour: 2
  schedule_minute: 0

  # Tier-2 oversize threshold for the HA recorder DB. If the file exceeds
  # this size at backup time, it is skipped and tagged 'optional_skipped'
  # in the manifest. See DESIGN_BACKUP_DR.md §3.
  recorder_skip_threshold_mb: 500

  # Runtime key material on the hub. Both files are mode 0600 (root-only)
  # and NEVER included in the backup bundle itself — including them would
  # create a circular dependency on restore.
  data_key_path: /etc/ziggy/data_key
  b2_credentials_path: /etc/ziggy/b2_credentials

  # Per-deployment paths. Defaults assume the bundled docker-compose
  # layout (docker/ha-config) and repo-relative user_files/ + config/.
  # Override if the hub runs HA outside the bundled stack.
  ha_config_dir: docker/ha-config
  user_files_dir: user_files
  config_dir: config

  # File lock — prevents two daily backups racing. /var/run is the
  # production default but requires the systemd unit to be able to
  # write there. Use /tmp/ziggy-backup.lock for unprivileged dev runs.
  # On non-POSIX platforms (no fcntl), locking is silently skipped.
  lock_path: /var/run/ziggy-backup.lock

  # Per-home identifiers. Source of truth is /etc/ziggy/kit_manifest.yaml
  # which the factory imaging script (per docs/SEAL_KEY_SNIPPET_FOR_FACTORY_IMAGING.md,
  # Chunk #10) writes during imaging — coordinator_type, device_id, and
  # coordinator_ieee come from there if the file exists. The fields below
  # are dev fallbacks when no kit manifest is present yet.
  kit_manifest_path: /etc/ziggy/kit_manifest.yaml
  device_id: REPLACE_WITH_DEVICE_ID
  coordinator_type: smlight

calendar:
  birthdays: calendar.birthdays
  holidays: calendar.holidays_in_israel
  personal: calendar.user_personal

contacts:
  # Optional address book used by comm_handler. Each entry is keyed by short name.
  example_person:
    email: person@example.com
    whatsapp: '+15551234567'

database:
  name: ziggy_web
  url: mongodb://localhost:27017

debug:
  enable_dashboard: true
  level: basic          # off | basic | verbose | trace
  scopes: []
  verbose: false
  verbose_logging: true

device_aliases_he:
  # Hebrew → English normalization map used by core/intent_parser.py.
  # Keep populated; intent parsing in Hebrew depends on these mappings.
  אור: light
  התאורה: the lights
  טלוויזיה: TV
  מאוורר: fan
  מזגן: AC
  מנעול: lock
  רמקול: speaker
  תאורה: lights

device_map:
  # Per-room canonical entity assignments. Used by light/climate/sensor
  # handlers to pick the right HA entity_id for an utterance like
  # "turn on the bedroom light". `null` means no entity assigned.
  bedroom:
    illuminance: null
    light: null
    motion: null
    temperature: null
  kitchen:
    illuminance: null
    light: null
    motion: null
  living_room:
    light: null
    motion: null
    temperature: null
    tv: null
  office:
    light: null

devices: {}              # reserved for future per-device overrides

email:
  enabled: false
  from_address: ziggyhome.notifications@example.com
  from_name: Ziggy
  host: smtp.gmail.com
  password: REPLACE_WITH_SMTP_APP_PASSWORD
  port: 587
  username: ziggyhome.notifications@example.com

entity_filter:
  extra_hidden_domains: []
  extra_hidden_patterns: []

features:
  buddy_mode: true
  file_management: true
  home_map: false
  ifttt: false
  local_storage: true
  media_music: false       # Phase 1+2 music/media. Off by default; toggle in Settings → Feature flags.
  rouge: false
  scenes: false
  smart_home: true
  task_tracking: false
  voice: true
  zigbee_support: true

global_sensors:
  # Cross-room sensors that handlers refer to by purpose, not by room.
  internet_status: null
  person_home: null
  sun_dawn: sensor.sun_next_dawn
  sun_dusk: sensor.sun_next_dusk
  sun_rising: sensor.sun_next_rising
  sun_setting: sensor.sun_next_setting

home:
  id: home-example-primary
  name: Home
  type: hub              # hub (local mini PC) | cloud (per-home VM)

home_assistant:
  # Long-lived HA access token. Generate at HA → Profile → Long-lived tokens.
  token: REPLACE_WITH_HA_LONG_LIVED_TOKEN
  url: http://homeassistant.local:8123/

# HA installer (Prompt 4) — version pinning + apply/rollback of the HA
# Docker image. Reads the target version from manifests staged by
# services/ota_client.py (Prompt 2). Ships dormant: auto_install defaults
# to false so chunks A–E land without changing any hub's behavior. Flip
# to true on one non-prod hub to validate, then enable elsewhere.
ha:
  # Path to the docker-compose file containing the homeassistant service.
  # Cloud: /opt/ziggy-homes/<home_id>/docker-compose.yml (per-home stack)
  # Local: ./docker-compose.yml (repo-relative)
  compose_file: ./docker-compose.yml
  # Image repo the installer pins a tag onto. The manifest's ha_version is
  # appended as the tag (e.g. ghcr.io/.../home-assistant:2026.5.1).
  image_repo: ghcr.io/home-assistant/home-assistant
  # URL the installer hits after restart to confirm the new version is
  # serving. From inside the Ziggy container this is the HA service's
  # in-network address (cloud topology: http://homeassistant:8123).
  health_url: http://homeassistant.local:8123
  # When false, a staged manifest sits in ota_state.json and waits for an
  # explicit admin trigger. When true, the scheduler applies it inside the
  # maintenance window. Default false so chunk-1 ships as a no-op.
  auto_install: false
  maintenance_window:
    start: "03:00"   # local time; runs after the 02:00 backup
    end:   "04:00"
  # Total budget for a single apply attempt (image pull + recreate + probe).
  apply_timeout_s: 600
  # Health probe cadence: attempts × interval = max wait for HA to report
  # the expected version. 12 × 10s = 120s tolerance for a slow startup.
  health_check_attempts: 12
  health_check_interval_s: 10

home_zone:
  # Coordinates of the home for presence calculations.
  lat: 0.0
  lon: 0.0
  radius_m: 100.0

ifttt:
  triggers:
  - light_on
  - light_off
  - send_notification
  webhook_key: YOUR_IFTTT_WEBHOOK_KEY

# Default response/UI language. Israel-first beta ships Hebrew-first: handlers
# emit Hebrew confirmation strings (via core/result_utils.L) and the frontend
# renders RTL. system.language below is the canonical source read by
# services/home_context.py; this top-level key is the fallback. Keep both in
# sync. Set to 'en' for an English-first deployment.
language: he

media:
  camera_map: {}
  default_cast_device: null
  default_speaker: null
  default_volume: 0.35
  device_map: {}

mqtt:
  # Broker for Zigbee2MQTT bridge control (permit-join, restart, rename).
  # Precedence at runtime (see services/mqtt_client.py + core/settings_loader.py):
  #   1. ZIGGY_MQTT_URL / MQTT_URL env var (a hub's HA VM DHCP lease can shift)
  #   2. mqtt.url below
  #   3. default mqtt://mosquitto:1883 (the in-compose broker name)
  #
  # The in-compose default broker is unauthenticated. PRODUCTION mosquitto is
  # deployed with auth enabled; put the credentials here (or embed them in the
  # url as mqtt://user:pass@host:1883). These discrete fields are the intended
  # config home for prod auth — keep the real values in config/secrets.yaml,
  # NOT in a committed settings.yaml.
  url: mqtt://mosquitto:1883
  host: mosquitto
  port: 1883
  username: ''            # e.g. ziggy — prod mosquitto user
  password: ''            # REPLACE_IN_SECRETS_YAML for production brokers

news:
  rss_sources:
  - https://feeds.bbci.co.uk/news/rss.xml

ollama:
  base_url: http://localhost:11434/v1
  model: qwen2.5:3b
  timeout: 30

openai:
  api_key: REPLACE_WITH_OPENAI_API_KEY

# Optional. Every LLM call routes through integrations/llm_gateway.py and
# resolves (backend, model) per purpose. Omit this block to use the baked-in
# defaults (shown below — these match what was previously hardcoded).
# Backends: openai | ollama | openai_whisper
models:
  intent_parse:            {backend: openai,         model: gpt-4o-mini}
  chat:                    {backend: openai,         model: gpt-4o}
  translate:               {backend: openai,         model: gpt-4o-mini}
  # If model is omitted for ollama, falls back to ollama.model above.
  suggestion_quality_gate: {backend: ollama,         model: qwen2.5:3b}
  map_render:              {backend: openai,         model: gpt-4o}
  stt:                     {backend: openai_whisper, model: whisper-1}

paths:
  file_store: files/
  logs: logs/
  memory_log: memory/memory_log.json
  task_log: memory/task_log.json

pattern_learning:
  analysis_hour: 20
  enabled: true
  llm_synthesis: true
  lookback_days: 25
  max_pending_suggestions: 3
  min_occurrences: 5
  sequence_gap_minutes: 5
  time_window_minutes: 45

presence:
  away_radius_m: 200.0
  cooldown_seconds: 600
  dwell_seconds: 60
  history_size: 20
  home_radius_m: 100.0
  max_accuracy_m: 150.0
  stale_away_minutes: 30
  stale_home_hours: 8
  stale_ping_seconds: 90

relay:
  # Per-home secret used to authenticate hub → relay traffic. Rotate per
  # PROMPT_SECURITY_HARDENING. The cloud provisioner generates this when
  # the home is created; for a self-hosted hub, set it once and store in env.
  secret: REPLACE_WITH_RELAY_SECRET
  tunnel_url: https://example.cfargotunnel.com
  url: https://ziggy-relay.fly.dev

roles:
  guests: []
  superadmin: []
  trusted_users: []

room_aliases:
  # Spoken aliases that resolve to canonical room keys.
  bath room: bathroom
  bathroom: bathroom
  bedroom: bedroom
  kitchen: kitchen
  living room: living_room
  master bedroom: master_bedroom
  office: office

room_aliases_he:
  אמבטיה: bathroom
  חדר שינה: bedroom
  מטבח: kitchen
  משרד: office
  סלון: living_room

sensor_alerts:
  cooldown_minutes: 10
  enabled: false
  poll_interval_s: 20
  sensors: []
  # Each sensor: { entity_id: ..., label: ..., conditions: { ... } }

serpapi:
  api_key: REPLACE_WITH_SERPAPI_KEY

system:
  # Canonical language + timezone (read by services/home_context.py and
  # core/result_utils.current_language). Israel-first beta defaults: Hebrew
  # responses, Jerusalem time. Change per deployment for other markets.
  language: he
  timezone: Asia/Jerusalem

target_registry: {}
  # Per-deployment registry of speakable targets (TVs, speakers, streamers).
  # Each entry: { ha_entity, name, room, aliases: [...], supports_audio,
  # supports_images, supports_video, type }.

todo:
  shopping_list: todo.shopping_list

users: []
# From v1.1 onward, user records and session tokens live in
# user_files/auth.db (SQLite). The block above is shown for documentation
# only. A one-shot migration copies any pre-existing users[] entries from
# settings.yaml into the DB on first boot of the updated agent.
#
# Reference shape of a single user row in auth.db (and the legacy YAML
# format for migration):
#   - username:       admin@example.com
#     role:           super_admin
#     password_hash:  <hex digest>
#     salt:           <hex>
#     session_tokens: [<token>, ...]   # capped at 20

voice:
  active_timeout_s: 90
  azure:
    speech_key: REPLACE_WITH_AZURE_SPEECH_KEY
    speech_region: eastus
    voice_en: en-US-JennyNeural
    voice_he: he-IL-HilaNeural
  # ---- Cartesia Sonic (PRIMARY cloud TTS — native Hebrew) ----
  # Chosen as default 2026-06-19 after live auditioning. 7 native Hebrew
  # voices (Yardena, Adi, Gil, Eitan, etc.) vs ElevenLabs' English voices
  # reading Hebrew phonetically. Also ~2.5x cheaper per character.
  #
  # API key lives in config/secrets.yaml — never here. The path
  # voice.cartesia.api_key is in _SECRET_PATHS so settings_loader strips
  # it on save even if pasted in by mistake.
  cartesia:
    # api_key: REPLACE_IN_SECRETS_YAML — do not put it here.
    model_id: sonic-3.5             # only model supporting Hebrew today
    output_format:
      container: mp3
      sample_rate: 44100
      bit_rate: 128000
    selected_voice_he: c5bc902c-bc31-40a8-b81f-7d3a1e1920bd  # Yardena (default)
    selected_voice_en: db6b0ed5-d5d3-463d-ae85-518a07d3c2b4  # Skylar (default)
    cache:
      enabled: true
      max_entries: 200
    available_voices:
      - id: c5bc902c-bc31-40a8-b81f-7d3a1e1920bd
        name: "Yardena"
        languages: [he]
        description: "Expert Facilitator — professional female (default HE)"
      - id: 2821fd0c-35c7-4adf-9c42-32e394bf85cb
        name: "Adi"
        languages: [he]
        description: "Efficient Expert — energetic female"
      - id: 84b969ad-19c7-428d-b742-48d387f7f138
        name: "Gil"
        languages: [he]
        description: "Friendly Host — warm male"
      - id: daa4d6bb-da62-4e16-8065-76cd87942475
        name: "Eitan"
        languages: [he]
        description: "Modern Communicator — contemporary male"
      - id: db6b0ed5-d5d3-463d-ae85-518a07d3c2b4
        name: "Skylar"
        languages: [en]
        description: "Friendly Guide — American female (default EN)"
      - id: 62ae83ad-4f6a-430b-af41-a9bede9286ca
        name: "Gemma"
        languages: [en]
        description: "Decisive Agent — confident British female"
      - id: 65209f8e-6140-4a20-b819-3cc2e21da19b
        name: "Nolan"
        languages: [en]
        description: "Expressive Agent — warm American male"
      - id: ef191366-f52f-447a-a398-ed8c0f2943a1
        name: "Archie"
        languages: [en]
        description: "Approachable Mate — warm British male"
  # ---- ElevenLabs (Premium tier upsell — not the default) ----
  # API key lives in config/secrets.yaml (or ELEVENLABS_API_KEY env var) —
  # NEVER paste it here. settings.yaml is git-tracked; keys here leak via
  # every push. settings_loader.save_settings() strips this path on save
  # as a belt-and-suspenders guard.
  #
  # Discover Hebrew voices:
  #     python scripts/discover_elevenlabs_voices.py
  # Audition a candidate:
  #     python scripts/discover_elevenlabs_voices.py --audition <voice_id>
  # Then paste the chosen voice_ids into selected_voice_he/en and
  # available_voices below.
  elevenlabs:
    # api_key: REPLACE_IN_SECRETS_YAML — do not put it here.
    #
    # Model choice (verified Jun 2026 against live API):
    #   eleven_multilingual_v2  — DEFAULT. Hebrew works (engine omits
    #                             language_code for HE — model auto-detects).
    #                             ~1s render for short replies. All premade
    #                             voices available. Best assistant fit.
    #   eleven_v3               — Slower (~2s) but more expressive. Accepts
    #                             language_code='he' explicitly. Reserve for
    #                             content/marketing voiceovers, not assistant.
    #   eleven_flash_v2_5       — Fastest (~75ms TTFB) but Hebrew is NOT
    #                             supported on this model — returns 400
    #                             unsupported_language. English-only.
    model_id: eleven_multilingual_v2
    output_format: mp3_44100_128    # plays via playsound on all platforms
    selected_voice_he: ""           # voice_id used for Hebrew replies
    selected_voice_en: ""           # voice_id used for English replies
    voice_settings:
      stability: 0.5                # 0-1. Lower = more expressive; higher = monotone
      similarity_boost: 0.75        # 0-1. Higher = closer to source speaker
      style: 0.0                    # 0-1. Style exaggeration; 0 is best for assistant
      use_speaker_boost: true       # sharpens timbre
    cache:
      enabled: true                 # caches rendered audio under cache/tts/elevenlabs/
      max_entries: 200              # LRU eviction beyond this count
    available_voices: []            # curated picker list, e.g.:
    #  - id: voice_id_here
    #    name: "Yael"
    #    languages: [he, en]
    #  - id: voice_id_here
    #    name: "Roi"
    #    languages: [he, en]
  enabled: true
  hebrew_model: ivrit-ai/whisper-large-v3-turbo-ct2
  language: en
  sensitivity: 0.5
  speed: 1.0
  stt_language: auto
  # ---- TTS ----
  # v1 ships with TTS OFF. Voice responses are delivered via push notification
  # + in-app text only. tts_engine + credentials stay configured so v1.1
  # can re-enable as a cloud-gated paid feature. See docs/RUNBOOK_VOICE.md.
  tts_enabled: false
  tts_engine: cartesia    # cartesia | elevenlabs | azure | piper
  tts_language: en
  # ---- Wake word ----
  # v1 ships PUSH-TO-TALK ONLY. Wake-word inference is experimental and
  # quarantined. See oww_data/README.md before flipping wakeword_enabled.
  wakeword_cooldown_ms: 1200
  wakeword_enabled: false
  wakeword_engine: oww    # oww | porcupine
  wakeword_hits: 3
  wakeword_model: hey_mycroft
  wakeword_threshold: 0.65

web_interface:
  backend_port: 8001
  enabled: true
  frontend_port: 3000
